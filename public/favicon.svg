<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <!-- outer double ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#5044E5" stroke-width="2.2"/>
  <circle cx="32" cy="32" r="27" fill="none" stroke="#5044E5" stroke-width="1"/>

  <!-- circuit traces — left side -->
  <line x1="5"  y1="32" x2="13" y2="32" stroke="#5044E5" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="13" y1="28" x2="13" y2="36" stroke="#5044E5" stroke-width="1" stroke-linecap="round"/>
  <line x1="9"  y1="28" x2="13" y2="28" stroke="#5044E5" stroke-width="1" stroke-linecap="round"/>
  <line x1="9"  y1="36" x2="13" y2="36" stroke="#5044E5" stroke-width="1" stroke-linecap="round"/>

  <!-- circuit traces — right side -->
  <line x1="59" y1="32" x2="51" y2="32" stroke="#5044E5" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="51" y1="28" x2="51" y2="36" stroke="#5044E5" stroke-width="1" stroke-linecap="round"/>
  <line x1="55" y1="28" x2="51" y2="28" stroke="#5044E5" stroke-width="1" stroke-linecap="round"/>
  <line x1="55" y1="36" x2="51" y2="36" stroke="#5044E5" stroke-width="1" stroke-linecap="round"/>

  <!-- circuit traces — top -->
  <line x1="32" y1="5"  x2="32" y2="14" stroke="#5044E5" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="27" y1="14" x2="37" y2="14" stroke="#5044E5" stroke-width="1" stroke-linecap="round"/>
  <line x1="27" y1="10" x2="27" y2="14" stroke="#5044E5" stroke-width="1" stroke-linecap="round"/>
  <line x1="37" y1="10" x2="37" y2="14" stroke="#5044E5" stroke-width="1" stroke-linecap="round"/>

  <!-- hexagon (flat-top) centered -->
  <polygon
    points="32,17 42,22.5 42,33.5 32,39 22,33.5 22,22.5"
    fill="none"
    stroke="#5044E5"
    stroke-width="1.8"
    stroke-linejoin="round"
  />

  <!-- inner hexagon fill -->
  <polygon
    points="32,20 39,24 39,32 32,36 25,32 25,24"
    fill="#5044E5"
    opacity="0.12"
  />

  <!-- mini circuit nodes inside hex -->
  <circle cx="32" cy="22" r="1.2" fill="#5044E5" opacity="0.8"/>
  <circle cx="37" cy="25" r="1.2" fill="#5044E5" opacity="0.8"/>
  <circle cx="37" cy="31" r="1.2" fill="#5044E5" opacity="0.8"/>
  <circle cx="32" cy="34" r="1.2" fill="#5044E5" opacity="0.8"/>
  <circle cx="27" cy="31" r="1.2" fill="#5044E5" opacity="0.8"/>
  <circle cx="27" cy="25" r="1.2" fill="#5044E5" opacity="0.8"/>

  <!-- center dot -->
  <circle cx="32" cy="28" r="2.5" fill="#5044E5"/>

  <!-- "N" letter below hex -->
  <text x="32" y="54"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="10"
    fill="#5044E5"
    text-anchor="middle"
    letter-spacing="1.5"
  >NIBX</text>

</svg>

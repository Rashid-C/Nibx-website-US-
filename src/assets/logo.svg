<svg width="168" height="44" viewBox="0 0 168 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nibx-g-l" x1="0" y1="0" x2="42" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#147AFF"/>
      <stop offset="1" stop-color="#5044E5"/>
    </linearGradient>
  </defs>

  <!-- outer hexagon (pointy-top, center 21,21, r=18) -->
  <polygon points="21,3 36.6,12 36.6,30 21,39 5.4,30 5.4,12"
    stroke="url(#nibx-g-l)" stroke-width="1.8" stroke-linejoin="round" fill="none"/>

  <!-- inner hexagon (r=12) -->
  <polygon points="21,9 31.4,15 31.4,27 21,33 10.6,27 10.6,15"
    stroke="url(#nibx-g-l)" stroke-width="0.9" stroke-linejoin="round" fill="none" opacity="0.35"/>

  <!-- circuit traces left / right / top -->
  <line x1="0"  y1="21" x2="5.4" y2="21" stroke="#5044E5" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="36.6" y1="21" x2="42" y2="21" stroke="#147AFF" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="21" y1="0"   x2="21" y2="3"  stroke="#5044E5" stroke-width="1.6" stroke-linecap="round"/>

  <!-- small branch stubs left/right -->
  <line x1="0" y1="17" x2="2.4" y2="17" stroke="#5044E5" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
  <line x1="0" y1="25" x2="2.4" y2="25" stroke="#5044E5" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
  <line x1="39.6" y1="17" x2="42" y2="17" stroke="#147AFF" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
  <line x1="39.6" y1="25" x2="42" y2="25" stroke="#147AFF" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>

  <!-- vertex nodes -->
  <circle cx="21"   cy="3"  r="1.6" fill="#147AFF"/>
  <circle cx="36.6" cy="12" r="1.6" fill="#5044E5"/>
  <circle cx="36.6" cy="30" r="1.6" fill="#5044E5"/>
  <circle cx="21"   cy="39" r="1.6" fill="#5044E5"/>
  <circle cx="5.4"  cy="30" r="1.6" fill="#147AFF"/>
  <circle cx="5.4"  cy="12" r="1.6" fill="#147AFF"/>

  <!-- trace-end pads -->
  <circle cx="0"  cy="21" r="1.3" fill="#5044E5" opacity="0.6"/>
  <circle cx="42" cy="21" r="1.3" fill="#147AFF" opacity="0.6"/>
  <circle cx="21" cy="0"  r="1.3" fill="#5044E5" opacity="0.6"/>

  <!-- inner cross (subtle) -->
  <line x1="13" y1="21" x2="29" y2="21" stroke="#5044E5" stroke-width="0.7" stroke-linecap="round" opacity="0.25"/>
  <line x1="21" y1="13" x2="21" y2="29" stroke="#5044E5" stroke-width="0.7" stroke-linecap="round" opacity="0.25"/>

  <!-- center node -->
  <circle cx="21" cy="21" r="3" fill="url(#nibx-g-l)"/>

  <!-- divider -->
  <line x1="50" y1="7" x2="50" y2="37" stroke="#E5E7EB" stroke-width="1"/>

  <!-- NIBX wordmark -->
  <text x="58" y="30"
    font-family="'Arial Black','Arial',sans-serif"
    font-weight="900"
    font-size="23"
    fill="#111827"
    letter-spacing="-0.5">NIBX</text>

  <!-- L.L.C. subtext -->
  <text x="59" y="40"
    font-family="'Arial','Helvetica',sans-serif"
    font-weight="500"
    font-size="8"
    fill="#6B7280"
    letter-spacing="3.5">L.L.C.</text>
</svg>
